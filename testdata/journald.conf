# See journald.conf(5) for details.

[Journal]
Storage=persistent
Compress=yes
#Seal=yes
#SplitMode=uid
#SyncIntervalSec=5m
#RateLimitIntervalSec=30s
#RateLimitBurst=10000
SystemMaxUse=500M
SystemKeepFree=1G
#SystemMaxFileSize=
MaxRetentionSec=1month
ForwardToSyslog=no
#ForwardToKMsg=no
#ForwardToConsole=no
