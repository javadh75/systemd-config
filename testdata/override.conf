# /etc/systemd/system/nginx.service.d/override.conf
# Drop-in created with "systemctl edit nginx". ExecStart= is first cleared,
# then replaced; the padded assignments below are trimmed by systemd.
[Service]
ExecStart=
ExecStart=/usr/sbin/nginx -c /etc/nginx/custom.conf -g 'daemon on; master_process on;'
LimitNOFILE = 65536
Nice = -5
