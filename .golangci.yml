version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - errcheck
    - errorlint
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - nilerr
    - revive
    - staticcheck
    - unused
    - wrapcheck
  settings:
    gocyclo:
      min-complexity: 15
  exclusions:
    generated: lax
    rules:
      # Tests get more slack: table dupes, unwrapped assertion errors, etc.
      - path: _test\.go
        linters:
          - dupl
          - errcheck
          - gocyclo
          - wrapcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/javadh75/systemd-config
