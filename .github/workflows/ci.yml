name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true
      - name: Install tools
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          make tools
      - name: Check
        run: make check
      - name: Coverage
        run: make coverage
      - name: Fuzz (smoke)
        run: make fuzz
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.out
            coverage.html
      - uses: codecov/codecov-action@v7
        continue-on-error: true
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  min-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
