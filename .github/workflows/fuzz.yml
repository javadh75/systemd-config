name: fuzz

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: 'stable'
          cache: true
      - name: Fuzz deserializer
        run: go test -run='^$' -fuzz=FuzzDeserialize -fuzztime=10m .
      - name: Upload crashers
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashers
          path: testdata/fuzz
